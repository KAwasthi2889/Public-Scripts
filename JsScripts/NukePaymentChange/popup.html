<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: #1e1e1e; color: #fff; margin: 0; box-sizing: border-box; }
    h3 { margin-top: 0; color: #4caf50; font-size: 18px; text-align: center; margin-bottom: 20px;}
    .form-group { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
    label { font-size: 13px; color: #ddd; }
    input[type="number"] { width: 60px; padding: 6px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; outline: none; transition: border-color 0.2s;}
    input[type="number"]:focus { border-color: #4caf50; }
    input[type="checkbox"] { transform: scale(1.3); accent-color: #4caf50; }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; transition: background-color 0.2s; }
    #runBtn { background-color: #4caf50; color: white; }
    #runBtn:hover { background-color: #45a049; }
    #stopBtn { background-color: #f44336; color: white; }
    #stopBtn:hover { background-color: #da190b; }
    .status { margin-top: 15px; font-size: 12px; text-align: center; color: #aaa; min-height: 15px;}
  </style>
</head>
<body>
  <h3>Payment Script Config</h3>

  <div class="form-group">
    <label title="Choose which script to run">Mode:</label>
    <select id="scriptMode" style="width: 140px; padding: 4px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; outline: none;">
      <option value="payment-status.js">Fast (API)</option>
      <option value="payment-status-DOM.js">Robust (DOM)</option>
    </select>
  </div>
  
  <div class="form-group">
    <label title="Skip the latest N entries">Skip Latest:</label>
    <input type="number" id="skipLatest" value="1" min="0">
  </div>
  
  <div class="form-group">
    <label title="Parallel requests per batch">Batch Size:</label>
    <input type="number" id="batchSize" value="5" min="1">
  </div>
  
  <div class="form-group">
    <label title="ms between batches">Delay (ms):</label>
    <input type="number" id="delayMs" value="300" min="0" step="50">
  </div>
  
  <div class="form-group">
    <label title="Entries per API page fetch">Page Size:</label>
    <input type="number" id="pageSize" value="100" min="10" step="10">
  </div>
  
  <div class="form-group">
    <label title="Retries per entry on failure">Max Retries:</label>
    <input type="number" id="maxRetries" value="2" min="0">
  </div>
  
  <div class="form-group">
    <label title="Preview only, no changes">Dry Run:</label>
    <input type="checkbox" id="dryRun">
  </div>

  <div class="btn-group">
    <button id="runBtn">Run Script</button>
    <button id="stopBtn">Stop</button>
  </div>
  
  <div class="status" id="statusMsg"></div>

  <script src="popup.js"></script>
</body>
</html>
